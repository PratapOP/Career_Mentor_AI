<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Mentor AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">

        <header class="terminal-header">
            <div class="status-indicator"></div>
            <span class="system-title">
                SYSTEM://CAREER_MENTOR_AI_v2.0
            </span>
        </header>

        <main class="terminal-body">

            <!-- INPUT PANEL -->

            <section class="panel input-panel">

                <h2 class="panel-title">
                    > CAREER_ANALYSIS_REQUEST
                </h2>

                <form id="mentorForm">

                    <div class="input-group">
                        <label for="skills">
                            CURRENT_SKILLS
                        </label>

                        <input
                            type="text"
                            id="skills"
                            name="skills"
                            placeholder="Python, SQL, Java, React..."
                            required
                        >
                    </div>

                    <div class="input-group">
                        <label for="project">
                            RECENT_PROJECT
                        </label>

                        <textarea
                            id="project"
                            name="project"
                            rows="5"
                            placeholder="Describe your latest project..."
                            required
                        ></textarea>
                    </div>

                    <div class="input-group">
                        <label for="target">
                            TARGET_ROLE
                        </label>

                        <input
                            type="text"
                            id="target"
                            name="target"
                            placeholder="Machine Learning Engineer"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="submit-btn"
                    >
                        ANALYZE_PROFILE
                    </button>

                </form>

            </section>

            <!-- OUTPUT PANEL -->

            <section class="panel output-panel">

                <h2 class="panel-title">
                    > ANALYSIS_RESULTS
                </h2>

                <div
                    class="output-screen"
                    id="outputScreen"
                >
                    <div class="terminal-prompt">
                        Awaiting analysis request...
                    </div>
                </div>

            </section>

        </main>

    </div>

    <script src="app.js"></script>

</body>
</html>
