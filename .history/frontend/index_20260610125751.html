<form id="mentorForm">

    <div class="input-group">

        <label for="skills">
            CURRENT SKILLS
        </label>

        <input
            type="text"
            id="skills"
            placeholder="Python, SQL, Flask, React"
            required
        >

    </div>

    <div class="input-group">

        <label for="project">
            RECENT PROJECT
        </label>

        <textarea
            id="project"
            placeholder="Describe your latest project..."
            required
        ></textarea>

    </div>

    <div class="input-group">

        <label for="target">
            TARGET ROLE
        </label>

        <input
            type="text"
            id="target"
            placeholder="Machine Learning Engineer"
            required
        >

    </div>

    <button
        type="submit"
        class="submit-btn"
    >
        ANALYZE PROFILE
    </button>

    <button
        type="button"
        class="submit-btn"
        id="atsButton"
        style="margin-top: 12px;"
    >
        ATS ANALYSIS
    </button>

    <button
        type="button"
        class="submit-btn"
        id="interviewButton"
        style="margin-top: 12px;"
    >
        INTERVIEW PREP
    </button>

</form>
