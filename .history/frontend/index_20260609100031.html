<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Mentor AI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="terminal-container">

        <header class="terminal-header">

            <div class="status-indicator"></div>

            <span class="system-title">
                SYSTEM://CAREER_MENTOR_AI_v2.0
            </span>

        </header>

        <main class="terminal-body">

            <section class="panel input-panel">

                <h2 class="panel-title">
                    > CAREER_ANALYSIS_REQUEST
                </h2>

                <form id="mentorForm">

                    <div class="input-group">

                        <label for="skills">
                            CURRENT SKILLS
                        </label>

                        <input
                            type="text"
                            id="skills"
                            placeholder="Python, SQL, Flask, React"
                            required
                        >

                    </div>

                    <div class="input-group">

                        <label for="project">
                            RECENT PROJECT
                        </label>

                        <textarea
                            id="project"
                            placeholder="Describe your latest project..."
                            required
                        ></textarea>

                    </div>

                    <div class="input-group">

                        <label for="target">
                            TARGET ROLE
                        </label>

                        <input
                            type="text"
                            id="target"
                            placeholder="Machine Learning Engineer"
                            required
                        >

                    </div>

                    <button
                        type="submit"
                        class="submit-btn"
                    >
                        ANALYZE PROFILE
                    </button>

                </form>

            </section>

            <section class="panel output-panel">

                <h2 class="panel-title">
                    > ANALYSIS_RESULTS
                </h2>

                <div
                    id="outputScreen"
                    class="output-screen"
                >

                    <div class="terminal-prompt">
                        Waiting for analysis...
                    </div>

                </div>

            </section>

        </main>

    </div>

    <script src="app.js"></script>

</body>
</html>
